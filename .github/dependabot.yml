version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Majors come as individual PRs on purpose: the dependency caps in
    # pyproject mean a breaking major (e.g. openai 2.x) must be reviewed
    # and the cap bumped deliberately, not auto-grouped.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
