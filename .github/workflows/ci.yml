name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,faiss,bm25,server,pgvector]"

      - name: Lint
        run: ruff check widemem/ tests/

      - name: Type check (informational)
        continue-on-error: true
        run: |
          pip install mypy
          mypy widemem/

      - name: Dependency audit (informational)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --progress-spinner off

      - name: Test
        run: pytest tests/ -v --cov=widemem --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build and check distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
