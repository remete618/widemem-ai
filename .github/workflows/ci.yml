name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,faiss,bm25,server,pgvector]"

      - name: Lint
        run: ruff check widemem/ tests/

      - name: Type check (informational)
        continue-on-error: true
        run: |
          pip install mypy
          mypy widemem/

      - name: Dependency audit (informational)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --progress-spinner off

      - name: Test
        run: pytest tests/ -v --cov=widemem --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build and check distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
